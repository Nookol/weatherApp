<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Neather Weather</title>
  <link rel="preconnect" href="https://api.openweathermap.org">
  <link rel="stylesheet" href="home.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-top">
        <div>
          <p class="eyebrow">Live local weather</p>
          <h1 id="location">Loading location…</h1>
          <p id="description" class="description">Fetching current conditions</p>
        </div>
        <div class="unit-toggle" aria-label="Temperature unit toggle">
          <button data-unit="f" class="unit-btn active">°F</button>
          <button data-unit="c" class="unit-btn">°C</button>
          <button data-unit="k" class="unit-btn">K</button>
        </div>
      </div>

      <div class="hero-main">
        <div>
          <div id="temp" class="temp">--</div>
          <div id="feelsLike" class="feels-like">Feels like --</div>
          <div id="minMax" class="min-max">H -- · L --</div>
        </div>
        <div id="weatherIcon" class="weather-icon" aria-hidden="true"></div>
      </div>

      <div class="meta-row">
        <div class="meta-pill"><span>Updated</span><strong id="updatedAt">--</strong></div>
        <div class="meta-pill"><span>Status</span><strong id="statusText">Loading…</strong></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>24-hour forecast</h2>
      </div>
      <div id="forecastTable" class="forecast-grid"></div>
    </section>

    <section class="panel quote-panel">
      <div class="panel-header">
        <h2>Quote</h2>
        <button type="button" id="quoteButton" class="ghost-btn">New quote</button>
      </div>
      <blockquote id="quoteRender">Loading quote…</blockquote>
    </section>
  </main>

  <script>
    const WEATHER_KEY = '6c433bc9b94f39c617df099ceedc1db6';
    const QUOTE_KEY = 'LnjeDenxFbDBi3GeIWsHNQ==hg2QrrJXh4l0JUoS';
    const DEFAULT_COORDS = { latitude: 26.0546106, longitude: -98.3939791 };
    const state = {
      unit: 'f',
      coords: null,
      weather: null,
      forecast: []
    };

    const els = {
      location: document.getElementById('location'),
      description: document.getElementById('description'),
      temp: document.getElementById('temp'),
      feelsLike: document.getElementById('feelsLike'),
      minMax: document.getElementById('minMax'),
      weatherIcon: document.getElementById('weatherIcon'),
      forecastTable: document.getElementById('forecastTable'),
      quoteRender: document.getElementById('quoteRender'),
      quoteButton: document.getElementById('quoteButton'),
      updatedAt: document.getElementById('updatedAt'),
      statusText: document.getElementById('statusText')
    };

    const timeFormatter = new Intl.DateTimeFormat(undefined, { hour: 'numeric' });
    const updatedFormatter = new Intl.DateTimeFormat(undefined, { hour: 'numeric', minute: '2-digit' });

    function setStatus(message) {
      els.statusText.textContent = message;
    }

    function convertTemp(kelvin, unit, withUnit = true) {
      if (kelvin == null) return '--';
      let value = kelvin;
      let suffix = 'K';
      if (unit === 'f') {
        value = (kelvin - 273.15) * 9 / 5 + 32;
        suffix = '°F';
      } else if (unit === 'c') {
        value = kelvin - 273.15;
        suffix = '°C';
      }
      return `${Math.round(value)}${withUnit ? suffix : '°'}`;
    }

    function iconMarkup(icon, description) {
      return `<img src="https://openweathermap.org/img/wn/${icon}@4x.png" alt="${description}">`;
    }

    function renderWeather() {
      if (!state.weather) return;
      const { name, description, temp, tempMin, tempMax, feelsLike, icon } = state.weather;
      els.location.textContent = name;
      els.description.textContent = description;
      els.temp.textContent = convertTemp(temp, state.unit, true);
      els.feelsLike.textContent = `Feels like ${convertTemp(feelsLike, state.unit, true)}`;
      els.minMax.textContent = `H ${convertTemp(tempMax, state.unit, true)} · L ${convertTemp(tempMin, state.unit, true)}`;
      els.weatherIcon.innerHTML = iconMarkup(icon, description);
      els.updatedAt.textContent = updatedFormatter.format(new Date());
    }

    function renderForecast() {
      if (!state.forecast.length) {
        els.forecastTable.innerHTML = '<div class="forecast-empty">Forecast unavailable</div>';
        return;
      }
      els.forecastTable.innerHTML = state.forecast.map(entry => `
        <article class="forecast-card">
          <p class="forecast-time">${timeFormatter.format(new Date(entry.dt * 1000))}</p>
          <img src="https://openweathermap.org/img/wn/${entry.icon}.png" alt="${entry.description}">
          <p class="forecast-temp">${convertTemp(entry.temp, state.unit, true)}</p>
          <p class="forecast-desc">${entry.description}</p>
        </article>
      `).join('');
    }

    function renderAll() {
      renderWeather();
      renderForecast();
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`Request failed: ${response.status}`);
      return response.json();
    }

    async function loadQuote() {
      try {
        const data = await fetchJson('https://api.api-ninjas.com/v1/quotes?category=intelligence', {
          headers: { 'X-Api-Key': QUOTE_KEY }
        });
        const quote = data?.[0];
        els.quoteRender.innerHTML = quote
          ? `“${quote.quote}”<footer>— ${quote.author}</footer>`
          : 'No quote available right now.';
      } catch {
        els.quoteRender.textContent = 'Quote unavailable right now.';
      }
    }

    async function loadWeather() {
      if (!state.coords) return;
      setStatus('Refreshing weather');
      const { latitude, longitude } = state.coords;
      const weatherUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${WEATHER_KEY}`;
      const forecastUrl = `https://api.openweathermap.org/data/2.5/onecall?lat=${latitude}&lon=${longitude}&appid=${WEATHER_KEY}`;
      try {
        const [weatherData, forecastData] = await Promise.all([
          fetchJson(weatherUrl),
          fetchJson(forecastUrl)
        ]);
        state.weather = {
          name: weatherData.name || 'Unknown location',
          description: weatherData.weather?.[0]?.description || 'No description',
          temp: weatherData.main?.temp,
          tempMin: weatherData.main?.temp_min,
          tempMax: weatherData.main?.temp_max,
          feelsLike: weatherData.main?.feels_like,
          icon: weatherData.weather?.[0]?.icon || '01d'
        };
        state.forecast = (forecastData.hourly || []).slice(0, 24).map(hour => ({
          dt: hour.dt,
          temp: hour.temp,
          icon: hour.weather?.[0]?.icon || '01d',
          description: hour.weather?.[0]?.main || ''
        }));
        renderAll();
        setStatus('Live');
      } catch (error) {
        console.error(error);
        setStatus('Weather unavailable');
        els.description.textContent = 'Could not load weather data';
      }
    }

    function setUnit(unit) {
      state.unit = unit;
      document.querySelectorAll('.unit-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.unit === unit);
      });
      renderAll();
    }

    function resolveLocation() {
      return new Promise(resolve => {
        if (!navigator.geolocation) {
          resolve(DEFAULT_COORDS);
          return;
        }
        navigator.geolocation.getCurrentPosition(
          position => resolve({
            latitude: position.coords.latitude,
            longitude: position.coords.longitude
          }),
          () => resolve(DEFAULT_COORDS),
          { enableHighAccuracy: true, maximumAge: 300000, timeout: 8000 }
        );
      });
    }

    document.querySelectorAll('.unit-btn').forEach(btn => {
      btn.addEventListener('click', () => setUnit(btn.dataset.unit));
    });
    els.quoteButton.addEventListener('click', loadQuote);

    async function init() {
      setStatus('Locating');
      state.coords = await resolveLocation();
      await Promise.all([loadWeather(), loadQuote()]);
    }

    init();
  </script>
</body>
</html>
